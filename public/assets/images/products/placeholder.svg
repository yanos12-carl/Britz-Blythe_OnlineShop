  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="32"/>
  <rect x="100" y="80" width="400" height="240" rx="24" fill="#ffffff" opacity="0.95"/>
  <rect x="150" y="140" width="300" height="160" rx="16" fill="url(#accent)" opacity="0.18"/>
  <text x="50%" y="75%" dominant-baseline="middle" text-anchor="middle" fill="#1f2a4d" font-family="DM Sans, sans-serif" font-size="28">Product Image</text>
